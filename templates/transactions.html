{% extends 'Base.html' %}
{% block title %} Транзакции {% endblock %}
{% block main %}
    <div class = "transaction_full">
        <div class = "transaction_report">
            <form class = "sort" method="post" action="">
                {% csrf_token %}
                {{ form_sort_tr }}
                <button type="submit" class = "btn_submit_sort_transaction" name="submit" value="btn_sort_tr">Обновить</button>
            </form>
            <table>
                <thead>
                    <tr>
                        <th>Сумма</th>
                        <th>Тип</th>
                        <th>Категория</th>
                        <th>Дата</th>
                        <th>Удалить</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in transac %}
                    <tr class = "{% cycle 'row1' 'row2' %}">
                        <td>{{ item.amount }}</td>
                        <td>{{ item.type }}</td>
                        <td>{{ item.category }}</td>
                        <td>{{ item.date }}</td>
                        <td>
                            <form method="post" action="{% url 'delete_transaction' pk=item.id %}"
                            onsubmit="return confirm('Вы уверены, что хотите удалить эту запись?');">
                                {% csrf_token %}
                                <button type="submit" class="btn-danger btn-sm">Удалить</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
{% endblock %}
